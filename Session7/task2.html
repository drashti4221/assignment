<!DOCTYPE html>
<html>
<head>
    <title>Spotify Playlist</title>

    <style>
        .playlist{
            display:flex;
            gap:20px;
            justify-content:center;
            margin-top:100px;
        }

        .card{
            width:180px;
            height:80px;
            background:#1DB954;
            color:white;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            border-radius:10px;
        }
    </style>
</head>
<body>

<div class="playlist">

<div class="card">
<h3>Perfect</h3>
<p>Ed Sheeran</p>
</div>

<div class="card">
<h3>Kesariya</h3>
<p>Arijit Singh</p>
</div>

<div class="card">
<h3>Apna Bana Le</h3>
<p>Arijit Singh</p>
</div>

<div class="card">
<h3>Tum Hi Ho</h3>
<p>Arijit Singh</p>
</div>

<div class="card">
<h3>Heeriye</h3>
<p>Arijit Singh</p>
</div>

</div>

</body>
</html>
