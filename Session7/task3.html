<!DOCTYPE html>
<html>
<head>
<title>Product Grid</title>

<style>

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:20px;
}

.card{
border:1px solid gray;
padding:10px;
text-align:center;
}

.card img{
width:150px;
height:150px;
}

</style>

</head>
<body>

<div class="grid">

<div class="card">
<img src="ipone16.jp.webp">
<h3>Mobile</h3>
</div>

<div class="card">
<img src="laptop.jp.jpg">
<h3>Laptop</h3>
</div>

<div class="card">
<img src="headphones.jp.avif">
<h3>Headphones</h3>
</div>

<div class="card">
<img src="watch.jp.webp">
<h3>Watch</h3>
</div>

<div class="card">
<img src="camera.jp.webp">
<h3>Camera</h3>
</div>

<div class="card">
<img src="shoes,jp.jpg">
<h3>Shoes</h3>
</div>

</div>

</body>
</html>
