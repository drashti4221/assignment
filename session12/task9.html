<!DOCTYPE html>
<html>
<head>
    <title>User Emails</title>
</head>
<body>

<script>
fetch("https://jsonplaceholder.typicode.com/users")
    .then(response => response.json())
    .then(users => {
        let emails = users.map(user => user.email);
        alert(emails.join(", "));
    })
    .catch(error => console.log(error));
</script>

</body>
</html>
