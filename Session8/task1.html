<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipkart Product Card</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f1f3f6;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:500px;
    display:flex;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

.card img{
    width:180px;
    height:180px;
    margin-right:20px;
}

.price{
    color:green;
    font-size:24px;
}

button{
    background:#2874F0;
    color:white;
    border:none;
    padding:10px 20px;
    cursor:pointer;
}

</style>

</head>
<body>

<div class="card">

<img src="https://m.media-amazon.com/images/I/610ub5kytVL.jpg">

<div>

<h2>Wireless Headphones</h2>

<p>Bluetooth Headphones</p>

<h3 class="price">₹9999</h3>

<button>Add to Cart</button>

</div>

</div>

</body>
</html>
