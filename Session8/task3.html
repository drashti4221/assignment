<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Breakpoints</title>

<style>

body{

font-family:Arial;
background:#f1f3f6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.card{

display:flex;
width:500px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px gray;
font-size:20px;

}

.card img{

width:180px;
height:180px;
margin-right:20px;

}

button{

background:#2874F0;
color:white;
padding:10px 20px;
border:none;

}

/* 1200px */

@media only screen and (max-width:1200px){

.card{

padding:20px;
font-size:18px;

}

}

/* 900px */

@media only screen and (max-width:900px){

.card{

padding:15px;
font-size:16px;

}

}

/* 600px */

@media only screen and (max-width:600px){

.card{

flex-direction:column;
text-align:center;
padding:10px;
font-size:14px;

}

.card img{

margin:0 auto 20px;

}

}

</style>

</head>

<body>

<div class="card">

<img src="https://rukminim2.flixcart.com/image/480/640/xif0q/headphone/h/l/s/-original-imahj9tfmknbwhwq.jpeg?q=90">

<div>

<h2>Wireless Headphones</h2>

<p>Bluetooth Headphones</p>

<h3 style="color:green;">₹5999</h3>

<button>Add to Cart</button>

</div>

</div>

</body>
</html>
