<body>
    <script>
     function formatFollowers(count) {
    try {
        if (count < 0) {
            throw new Error("Negative count");
        }

        return count + " followers";
    }
    catch (e) {
        return e.message;
    }
}

console.log(formatFollowers(1200));
console.log(formatFollowers(-10));
    </script>
</body>
</html>
