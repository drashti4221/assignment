<body>
    <script>
    let cart = [
  {
    productName: "Laptop",
    price: 50000,
    quantity: 1
  },
  {
    productName: "Mouse",
    price: 700,
    quantity: 2
  },
  {
    productName: "Keyboard",
    price: 1200,
    quantity: 1
  },
  {
    productName: "Headphones",
    price: 1500,
    quantity: 2
  }
];

for (let i = 0; i < cart.length; i++) {
  let totalPrice = cart[i].price * cart[i].quantity;

  console.log("Product:", cart[i].productName);
  console.log("Total Price:", totalPrice);
}
    </script>
    
</body>
