<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Movie Carousel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<div id="movieCarousel" class="carousel slide" data-bs-ride="carousel">

<div class="carousel-inner">

<div class="carousel-item active">

<img src="https://via.placeholder.com/800x400?text=Avengers" class="d-block w-100">

<div class="carousel-caption">
<h5>Avengers Endgame</h5>
</div>

</div>

<div class="carousel-item">

<img src="https://via.placeholder.com/800x400?text=Pushpa" class="d-block w-100">

<div class="carousel-caption">
<h5>Pushpa 2</h5>
</div>

</div>

<div class="carousel-item">

<img src="https://m.media-amazon.com/images/I/711eHgGtnFL._AC_UF1000,1000_QL80_.jpg" class="d-block w-100">

<div class="carousel-caption">
<h5>Bahubali 2</h5>
</div>

</div>

</div>

<button class="carousel-control-prev" type="button" data-bs-target="#movieCarousel" data-bs-slide="prev">
<span class="carousel-control-prev-icon"></span>
</button>

<button class="carousel-control-next" type="button" data-bs-target="#movieCarousel" data-bs-slide="next">
<span class="carousel-control-next-icon"></span>
</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
