<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamer Tag Bio Link</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#121212;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    background:#1f1f1f;
    padding:30px;
    border-radius:15px;
    text-align:center;
    max-width:400px;
    width:100%;
    box-shadow:0 0 15px rgba(255,255,255,0.2);
}

.avatar{
    width:150px;
    height:150px;
    border-radius:50%;
    border:4px solid #00ff99;
    object-fit:cover;
}

h1{
    margin-top:15px;
    font-size:30px;
}

p{
    color:#ccc;
    margin-bottom:20px;
}

.links{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.links a{
    text-decoration:none;
    background:#00ff99;
    color:black;
    padding:12px;
    border-radius:8px;
    font-weight:bold;
    transition:.3s;
}

.links a:hover{
    background:#00cc77;
}

@media(max-width:768px){

.container{
    max-width:90%;
}

.avatar{
    width:120px;
    height:120px;
}

h1{
    font-size:24px;
}

}

</style>

</head>

<body>

<div class="container">

<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQSw4zJOsCVo4jKvqwK6E1ybMTdUm14nijxec6e44Z3sw&s=10" class="avatar" alt="Avatar">

<h1>Shadow Gamer</h1>

<p>🎮 Pro Gamer | Streaming Daily</p>

<div class="links">

<a href="https://www.twitch.tv" target="_blank">🎥 Twitch</a>

<a href="https://discord.com" target="_blank">💬 Discord</a>

<a href="https://store.steampowered.com" target="_blank">🎮 Steam</a>

</div>

</div>

</body>
</html>
