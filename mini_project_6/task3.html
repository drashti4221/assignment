<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Links Form</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

.container{
    width:400px;
    margin:50px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.input-box{
    position:relative;
    margin-bottom:20px;
}

.input-box img{
    position:absolute;
    left:10px;
    top:50%;
    transform:translateY(-50%);
    width:22px;
    height:22px;
}

.input-box input{
    width:100%;
    padding:12px 12px 12px 45px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0056b3;
}

</style>

</head>

<body>

<div class="container">

<h2>Social Links Form</h2>

<form>

<div class="input-box">

<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram">

<input type="url" placeholder="Instagram Profile URL">

</div>

<div class="input-box">

<img src="https://cdn-icons-png.flaticon.com/512/174/174857.png" alt="LinkedIn">

<input type="url" placeholder="LinkedIn Profile URL">

</div>

<div class="input-box">

<img src="https://cdn-icons-png.flaticon.com/512/174/174872.png" alt="Spotify">

<input type="url" placeholder="Spotify Profile URL">

</div>

<button type="submit">Add Links</button>

</form>

</div>

</body>
</html>
