<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Bio Link Preview</title>

<style>

body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    padding:30px;
}

.container{
    width:400px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

#cards{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    margin-top:30px;
}

.card{
    width:220px;
    padding:15px;
    border-radius:10px;
    text-align:center;
    color:white;
}

.card img{
    width:50px;
    height:50px;
}

.spotify{
    background:#1DB954;
}

.instagram{
    background:#E1306C;
}

.linkedin{
    background:#0A66C2;
}

.visit{
    display:inline-block;
    margin-top:10px;
    background:white;
    color:black;
    padding:8px 15px;
    text-decoration:none;
    border-radius:5px;
    font-weight:bold;
}

</style>

</head>
<body>

<div class="container">

<h2>Social Bio Links</h2>

<input type="url" id="spotify" placeholder="Spotify URL">

<input type="url" id="instagram" placeholder="Instagram URL">

<input type="url" id="linkedin" placeholder="LinkedIn URL">

<button onclick="showCards()">Submit</button>

</div>

<div id="cards"></div>

<script>

function getUsername(url){

if(url==="") return "";

let parts=url.split("/");

return parts[parts.length-1] || parts[parts.length-2];

}

function showCards(){

let cards=document.getElementById("cards");

cards.innerHTML="";

let spotify=document.getElementById("spotify").value;

let instagram=document.getElementById("instagram").value;

let linkedin=document.getElementById("linkedin").value;

if(spotify!=""){

cards.innerHTML+=`
<div class="card spotify">
<img src="https://cdn-icons-png.flaticon.com/512/174/174872.png">
<h3>Spotify</h3>
<p>@${getUsername(spotify)}</p>
<a href="${spotify}" target="_blank" class="visit">Visit</a>
</div>
`;

}

if(instagram!=""){

cards.innerHTML+=`
<div class="card instagram">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
<h3>Instagram</h3>
<p>@${getUsername(instagram)}</p>
<a href="${instagram}" target="_blank" class="visit">Visit</a>
</div>
`;

}

if(linkedin!=""){

cards.innerHTML+=`
<div class="card linkedin">
<img src="https://cdn-icons-png.flaticon.com/512/174/174857.png">
<h3>LinkedIn</h3>
<p>@${getUsername(linkedin)}</p>
<a href="${linkedin}" target="_blank" class="visit">Visit</a>
</div>
`;

}

}

</script>

</body>
</html>
