<!DOCTYPE html>
<html>
<head>
<style>

.card{
    width:250px;
    border:1px solid black;
    padding:10px;
    margin:10px;
    display:flex;
    justify-content:space-between;
}

.remove{
    color:red;
    cursor:pointer;
    font-weight:bold;
}

</style>
</head>
<body>

<div id="cart">

    <div class="card">
        Laptop
        <span class="remove">X</span>
    </div>

    <div class="card">
        Mouse
        <span class="remove">X</span>
    </div>

    <div class="card">
        Keyboard
        <span class="remove">X</span>
    </div>

</div>

<script>

let cart=document.getElementById("cart");

cart.addEventListener("click",function(e){

    if(e.target.classList.contains("remove")){
        e.target.parentElement.remove();
    }

});

</script>

</body>
</html>
