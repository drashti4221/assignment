<body>
    <script>
     const getFollowersSummary = (...followers) => {
    let total = 0;

    for (let count of followers) {
        total += count;
    }

    return `Total followers: ${total}`;
};

console.log(getFollowersSummary(300, 500, 400));
    </script>
</body>
