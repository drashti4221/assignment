<!DOCTYPE html>
<html>
<head>
    <title>Playlist Buttons</title>
</head>
<body>

<script>
function createPlaylistButton(songName, themeColor) {
    let button = document.createElement("button");

    button.innerText = songName;
    button.style.backgroundColor = themeColor;
    button.style.color = "white";
    button.style.padding = "10px";
    button.style.margin = "10px";
    button.style.border = "none";
    button.style.borderRadius = "5px";

    return button;
}

document.body.appendChild(createPlaylistButton("Kesariya", "green"));
document.body.appendChild(createPlaylistButton("Heeriye", "purple"));
document.body.appendChild(createPlaylistButton("Tum Hi Ho", "red"));
</script>

</body>
</html>
