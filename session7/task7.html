<!DOCTYPE html>
<html>
<head>
    <title>Like Button</title>
</head>
<body>

<button id="likeBtn">❤️ Like 0</button>

<script>
let count = 0;

document.getElementById("likeBtn").addEventListener("click", function () {
    count++;
    this.innerHTML = "❤️ Like " + count;
});
</script>

</body>
</html>
