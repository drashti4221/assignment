<!DOCTYPE html>
<html>
<head>
    <title>Spotify Playlist Form</title>

    <style>
        body{
            font-family: Arial;
            margin: 30px;
        }

        input{
            width: 250px;
            padding: 8px;
            margin: 10px 0;
        }

        button{
            padding: 8px 20px;
        }

        .error{
            color: red;
            font-size: 14px;
        }
    </style>
</head>
<body>

<h2>Create Playlist</h2>

<input type="text" id="playlistName" placeholder="Playlist Name">
<div id="nameError" class="error"></div>

<input type="text" id="description" placeholder="Description">
<div id="descError" class="error"></div>

<br>

<button onclick="addPlaylist()">Add Playlist</button>

<script>

function addPlaylist(){

    let playlistName = document.getElementById("playlistName").value;
    let description = document.getElementById("description").value;

    document.getElementById("nameError").innerHTML = "";
    document.getElementById("descError").innerHTML = "";

    let valid = true;

    if(playlistName.trim() === ""){
        document.getElementById("nameError").innerHTML = "Playlist name is required";
        valid = false;
    }

    if(description.trim() === ""){
        document.getElementById("descError").innerHTML = "Description is required";
        valid = false;
    }

    if(valid){
        alert("Playlist Added Successfully");

        document.getElementById("playlistName").value = "";
        document.getElementById("description").value = "";
    }

}

</script>

</body>
</html>
