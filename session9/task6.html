<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <script>
    let searches = [];

function saveRecentSearch(query) {
    searches.push(query);

    let jsonData = JSON.stringify(searches);

    localStorage.setItem("recentSearches", jsonData);

    console.log(localStorage.getItem("recentSearches"));
}

saveRecentSearch("Biryani");
saveRecentSearch("Sneakers");
saveRecentSearch("Laptop");
    </script>
</body>
</html>
