<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    class Playlist {
    constructor(name, songs) {
        this.name = name;
        this.songs = songs;
    }

    getSongCount() {
        return this.songs.length;
    }
}

let playlist = new Playlist("Chill Vibes", [
    "Perfect",
    "Believer",
    "Shape of You"
]);

console.log("Total Songs:", playlist.getSongCount());
    </script>
</body>
</html>
