<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    class Playlist {
    constructor(name, songs) {
        this.name = name;
        this.songs = songs;
    }

    addSong(songName) {
        this.songs.push(songName);
    }

    displayPlaylist() {
        console.log(`Playlist: ${this.name}`);
        console.log(`Songs: ${this.songs.join(", ")}`);
    }
}

let playlist = new Playlist("Chill Vibes", [
    "Perfect",
    "Believer"
]);

playlist.addSong("Faded");
playlist.addSong("Memories");

playlist.displayPlaylist();
    </script>
</body>
</html>
