<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Forms Assignment</title>
</head>
<body>

    <!-- 1, 2 & 3. Flipkart Review Form -->

    <h2>Flipkart Product Review Form</h2>

    <form action="#" method="POST">

        <label for="username">Username:</label><br>
        <input
            type="text"
            id="username"
            name="username"
            required
        ><br><br>

        <label for="rating">Rating:</label><br>
        <select id="rating" name="rating" required>
            <option value="" selected disabled>Select Rating</option>
            <option value="1">1 - Poor</option>
            <option value="2">2 - Fair</option>
            <option value="3">3 - Good</option>
            <option value="4">4 - Very Good</option>
            <option value="5">5 - Excellent</option>
        </select>

        <br><br>

        <label for="review">Review Message:</label><br>
        <textarea
            id="review"
            name="review"
            rows="5"
            cols="40"
            minlength="20"
            required
        ></textarea>

        <br><br>

        <input type="submit" value="Submit Review">

    </form>

    <hr>

    <!-- 4 & 5. Zomato Food Order Form -->

    <h2>Zomato Food Order Form</h2>

    <form action="#" method="POST">

        <label for="orderid">Order ID:</label><br>
        <input
            type="text"
            id="orderid"
            value="ORD12345"
            disabled
        >

        <br><br>

        <label for="name">Customer Name:</label><br>
        <input
            type="text"
            id="name"
            name="name"
            required
        >

        <br><br>

        <label for="food">Food Item:</label><br>
        <select
            id="food"
            name="food"
            required
        >
            <option value="" selected disabled>Select Food</option>
            <option value="Pizza">Pizza</option>
            <option value="Burger">Burger</option>
            <option value="Pasta">Pasta</option>
        </select>

        <br><br>

        <label for="quantity">Quantity:</label><br>
        <input
            type="number"
            id="quantity"
            name="quantity"
            min="1"
            required
        >

        <br><br>

        <label for="instructions">Delivery Instructions:</label><br>
        <textarea
            id="instructions"
            name="instructions"
            rows="4"
            cols="40"
            required
        ></textarea>

        <br><br>

        <input type="submit" value="Place Order">

    </form>

</body>
</html>
