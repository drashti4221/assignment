<!DOCTYPE html>

<body>
    <script>
    let posts = [
    { likes: 150 },
    { likes: 300 },
    { likes: 450 }
];

let totalLikes = posts.reduce((total, post) => {
    return total + post.likes;
}, 0);

console.log("Total Likes:", totalLikes);
    </script>
</body>
