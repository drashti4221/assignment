<!DOCTYPE html>
<html>
<head>
    <title>Followers Promise</title>
</head>
<body>

<script>
const getFollowersCount = new Promise(function(resolve, reject) {

    setTimeout(function() {
        let followers = Math.floor(Math.random() * 4001) + 1000;
        resolve(followers);
    }, 1000);

});

getFollowersCount.then(function(count) {
    console.log(`You have ${count} new followers`);
});
</script>

</body>
</html>
