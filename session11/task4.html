<!DOCTYPE html>
<html>
<head>
    <title>Zomato Callback</title>
</head>
<body>

<script>
function placeOrder(item, callback) {
    setTimeout(function () {
        callback("Your " + item + " is being prepared");
    }, 1000);
}

placeOrder("Pizza", function (message) {
    console.log(message);
});
</script>

</body>
</html>
