<!DOCTYPE html>
<html>
<head>
    <title>Payment Promise</title>
</head>
<body>

<script>
  function paymentSuccess() {

    return new Promise(function(resolve) {

        setTimeout(function() {
            resolve("Payment successful!");
        }, 1000);

    });

}

paymentSuccess()
.then(function(message) {
    console.log(message);
});
</script>

</body>
</html>
