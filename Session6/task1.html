<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato Card</title>
    <style>
        .restaurant-card {
            width: 300px;
            border: 2px solid #ddd;
            padding: 15px;
            border-radius: 10px;
            font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial,
             sans-serif;
            margin: 10px;
            margin-top: 10px;
        }

        .restaurant-name {
            background-color: aquamarine;
            border-bottom: 1px solid #bd1313;
            font-size: 30px;
            font-weight: bold;
            text-align: center;
            font-style:bold;
            margin: 10px;
            margin-bottom: 10px;
            
        }

        .cuisine {
           
            border-bottom: 1px solid #a02e2e;
            color: gray;
        }

        .rating {
            color: rgb(149, 221, 14);
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="restaurant-card">
    <div class="restaurant-name">pepito</div>
    <div class="cuisine">mexican, Chinese</div>
    <div class="rating">⭐ 4.5</div>
</div>

</body>
</head>
</html>
