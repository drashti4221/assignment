<!DOCTYPE html>
<html>
<head>
    <title>Reusable CSS Class Example</title>

    <style>
        .box {
            border: 2px solid black;
            background-color: lightblue;
        }
        .common-space {
            margin: 20px;
            padding: 15px;
        }
    </style>
</head>

<body>

    <div class="box common-space">
        <h2>Box 1</h2>
        <p>This is the first box.</p>
    </div>

    <div class="box common-space">
        <h2>Box 2</h2>
        <p>This is the second box.</p>
    </div>

</body>
</html>
