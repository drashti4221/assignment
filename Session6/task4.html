<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMyShow Movie Poster Grid</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 20px;
        }

        h2 {
            text-align: center;
            color: #d81b60;
        }

        .grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .poster {
            position: relative;
            width: 180px;
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            background-color: #fff;
            text-align: center;
        }

        .poster img {
            width: 100%;
            display: block;
        }

        .poster h3 {
            margin: 10px 0;
        }

        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: red;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>BookMyShow Movie Posters</h2>

    <div class="grid">

        <div class="poster">
            <span class="badge">New</span>
            <img src="https://m.media-amazon.com/images/M/MV5BNzY2MWQwODktZWMyYS00ODYyLWFjYzMtNDRmN2IwMWYyYzQzXkEyXkFqcGc@._V" alt="Movie 1">
            <h3>Movie One</h3>
        </div>

        <div class="poster">
            <img src="https://cdn.district.in/movies-assets/images/cinema/Cocktail-2-psoter-67e23a70-4d39-11f1-9d00-63097e6b54f9.jpg" alt="Movie 2">
            <h3>Movie Two</h3>
        </div>

        <div class="poster">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTIBJGvXm_a3attUPn3VFJZl8ywNmr9M4n_6VOG5SgC-g&s=10" alt="Movie 3">
            <h3>Movie Three</h3>
        </div>

    </div>

</body>
</html>
