<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Product Tile</title>
    <style>
        .product-tile {
            width: 250px;
            border: 1px solid #ccc;
            padding: 15px;
            text-align: center;
        }

        .product-name {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        .price {
            display:inline-flexbox;
            background: #961f1f;
            padding: 1px 10px;
            margin-bottom: 10px;
            color: red
        }

        .hide-price {
            display:flex;
        }
    </style>
</head>

<body>
    <div class="product-tile">
        <img src="tumbler.webp" height="205px" alt="only pink tumbler">

        <span class="product-name">
            tumbler
        </span>

        <span class="price">
            ₹1,999
        </span>
</body>

</html>
